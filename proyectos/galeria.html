<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria</title>
  <link rel="stylesheet" href="galeria.css">
</head>
<body>

<h1>Galeria de imagenes</h1>
<main>

  <div class="gallery">
    <div class="image-container"><img src="imagen1.jpg" alt="Imagen 1"></div>
    <div class="image-container"><img src="imagen2.jpg" alt="Imagen 2"></div>
    <div class="image-container"><img src="imagen3.jpg" alt="Imagen 3"></div>
    <div class="image-container"><img src="imagen4.jpg" alt="Imagen 4"></div>
    <div class="image-container"><img src="imagen5.jpg" alt="Imagen 5"></div>
    <div class="image-container"><img src="imagen6.jpg" alt="Imagen 6"></div>
    <div class="image-container"><img src="imagen7.jpg" alt="Imagen 7"></div>
    <div class="image-container"><img src="imagen8.jpg" alt="Imagen 8"></div>
    <div class="image-container"><img src="imagen9.jpg" alt="Imagen 9"></div>
    <div class="image-container"><img src="imagen10.jpg" alt="Imagen 10"></div>
    <div class="image-container"><img src="imagen11.jpg" alt="Imagen 11"></div>
    <div class="image-container"><img src="imagen12.jpg" alt="Imagen 12"></div>
  </div>


  <!-- Modal para mostrar la imagen ampliada -->
  <div class="modal">
    <span class="close">&times;</span>
    <button class="prev">&#9664;</button>
    <img class="modal-content" id="modal-img" alt="Imagen ampliada">
    <button class="next">&#9654;</button>
  </div>

  <script src="galeria.js"></script>
</main>
</body>
</html>
