<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño Tipo Tablero</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: grid;
      grid-template-areas:
        "a a b b"
        "c d d e"
        "f f g h";
      grid-template-rows: 150px 200px 150px;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
      height: 100vh;
      background-color: #f7f9fc;
    }

    div {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.5em;
      font-weight: bold;
      border-radius: 8px;
    }

    .a {
      grid-area: a;
      background-color: #3c82d6;
    }

    .b {
      grid-area: b;
      background-color: #4caf50;
    }

    .c {
      grid-area: c;
      background-color: #f44336;
    }

    .d {
      grid-area: d;
      background-color: #ff9800;
    }

    .e {
      grid-area: e;
      background-color: #9c27b0;
    }

    .f {
      grid-area: f;
      background-color: #2196f3;
    }

    .g {
      grid-area: g;
      background-color: #009688;
    }

    .h {
      grid-area: h;
      background-color: #795548;
    }

    @media (max-width: 768px) {
      body {
        grid-template-areas:
          "a"
          "b"
          "c"
          "d"
          "e"
          "f"
          "g"
          "h";
        grid-template-columns: 1fr;
        grid-template-rows: repeat(8, 150px);
      }
    }
  </style>
</head>
<body>
  <div class="a">A</div>
  <div class="b">B</div>
  <div class="c">C</div>
  <div class="d">D</div>
  <div class="e">E</div>
  <div class="f">F</div>
  <div class="g">G</div>
  <div class="h">H</div>
</body>
</html>
