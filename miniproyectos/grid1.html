<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería en CSS Grid</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .item h3 {
      margin-top: 10px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <h1>Galería de imágenes</h1>
  <div class="galeria">
    <div class="item">
      <img src="grid1a.jpg" alt="Imagen 1">
      <h3>Título 1</h3>
    </div>
    <div class="item">
      <img src="grid1b.jpg" alt="Imagen 2">
      <h3>Título 2</h3>
    </div>
    <div class="item">
      <img src="grid1c.jpg" alt="Imagen 3">
      <h3>Título 3</h3>
    </div>
    <div class="item">
      <img src="grid1d.jpg" alt="Imagen 4">
      <h3>Título 4</h3>
    </div>
  </div>
</body>
</html>
