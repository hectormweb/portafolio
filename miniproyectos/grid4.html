<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="vviewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Moderno</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: grid;
      grid-template-areas:
        "header header header"
        "sidebar main main"
        "sidebar charts charts"
        "footer footer footer";
      grid-template-rows: 80px auto auto 50px;
      grid-template-columns: 200px 1fr 1fr;
      gap: 10px;
      padding: 10px;
      background-color: #f4f7fa;
      height: 100vh;
    }

    div {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 8px;
    }

    header {
      grid-area: header;
      background-color: #3b82f6;
    }

    .sidebar {
      grid-area: sidebar;
      background-color: #1e293b;
    }

    .main {
      grid-area: main;
      background-color: #22c55e;
    }

    .charts {
      grid-area: charts;
      background-color: #f97316;
    }

    footer {
      grid-area: footer;
      background-color: #64748b;
    }

    @media (max-width: 768px) {
      body {
        grid-template-areas:
          "header"
          "main"
          "charts"
          "sidebar"
          "footer";
        grid-template-rows: 80px auto auto auto 50px;
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 3; /* Mueve la barra lateral después de las secciones principales */
      }
    }
  </style>
</head>
<body>
  <header>Encabezado</header>
  <div class="sidebar">Barra Lateral</div>
  <div class="main">Contenido Principal</div>
  <div class="charts">Gráficos</div>
  <footer>Pie de Página</footer>
</body>
</html>
